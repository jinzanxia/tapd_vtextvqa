# Example config for COCO Mask R-CNN R50-FPN
MODEL:
  META_ARCHITECTURE: "GeneralizedRCNN"
  WEIGHTS: "detectron2://COCO-InstanceSegmentation/mask_rcnn_R_50_FPN_3x/137849600/model_final_f10217.pkl"
  MASK_ON: True
  RESNETS:
    DEPTH: 50
  ROI_HEADS:
    NAME: "StandardROIHeads"
    NUM_CLASSES: 80
    SCORE_THRESH_TEST: 0.5
INPUT:
  FORMAT: "BGR"
DATASETS:
  TEST: ("coco_2017_val",)
SOLVER:
  IMS_PER_BATCH: 2
  BASE_LR: 0.0025
  STEPS: (60000, 80000)
  MAX_ITER: 90000
OUTPUT_DIR: "./output"
